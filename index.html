    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.55);
            --accent: #ffffff;
            --button-fill: #ffffff;
            --button-text: #0a0a0a;
            --font-body: 'Inter', sans-serif;
            --font-caption: 'Space Mono', monospace;
            --radius-sm: 12px;
            --radius-md: 16px;
            --transition: 400ms ease;
        }

        html {
            scroll-behavior: smooth;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        img, video {
            max-width: 100%;
            display: block;
        }

        a { text-decoration: none; color: inherit; }

        button {
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
            outline: inherit;
        }

        *:focus-visible {
            outline: 2px solid rgba(255,255,255,0.5);
            outline-offset: 3px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: auto;
            min-width: unset;
            max-width: 720px;
            border-radius: 999px;
            background: rgba(10,10,10,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            padding: 10px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
        }

        .navbar-brand {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.05em;
        }
        .navbar-brand img { display: block; height: 36px; width: auto; object-fit: contain; }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .navbar-links a {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
            position: relative;
            transition: color var(--transition);
        }

        .navbar-links a:hover { color: var(--text-primary); }

        .navbar-links a.active {
            color: var(--text-primary);
        }

        .navbar-links a.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--text-primary);
        }

        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar-icons button {
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity var(--transition);
        }

        .navbar-icons button:hover { opacity: 0.7; }

        .hamburger { display: none; }
        .cart-btn-wrap { position: relative; }
        .cart-badge { position: absolute; top: -4px; right: -6px; background: white; color: #0a0a0a; font-size: 0.55rem; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; font-family: 'Inter',sans-serif; pointer-events: none; padding: 0 4px; line-height: 1; }

        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            background: rgba(10,10,10,0.97);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .mobile-menu-overlay.open { display: flex; }

        .mobile-menu-overlay a {
            font-size: 1.6rem;
            font-weight: 300;
            color: rgba(255,255,255,0.8);
            transition: color var(--transition);
        }

        .mobile-menu-overlay a:hover { color: var(--text-primary); }

        .mobile-menu-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: var(--text-primary);
        }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .hero-image-wrap {
            position: absolute;
            top: -3%;
            left: 50%;
            width: 110%;
            height: 110%;
            transform: translateX(-50%) scale(1.15);
            will-change: transform;
        }

        .hero-image-wrap img,
        .hero-image-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .hero-bottom-content {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            z-index: 3;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 40px;
        }

        .hero-text-block {
            max-width: 420px;
        }

        .hero-text-block h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            font-size: clamp(3rem, 7vw, 5.5rem);
            line-height: 0.95;
        }

        .hero-order-btn {
            display: inline-block;
            padding: 20px 56px;
            background: white;
            color: #0a0a0a;
            border-radius: 999px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .hero-order-btn:hover { background: rgba(255,255,255,0.9); transform: translateY(-2px); box-shadow: 0 8px 40px rgba(255,255,255,0.2); }

        .hero-bottom-fog {
            display: none;
        }

        /* ===== FOG DIVIDER ===== */
        .fog-divider {
            width: 100%;
            height: 120px;
            margin-top: -120px;
            position: relative;
            z-index: 5;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent 0%, #0a0a0a 100%);
        }

        /* ===== PRODUCTS ===== */
        .products {
            background: var(--bg);
            padding: clamp(40px, 8vw, 100px) 0;
            position: relative;
            z-index: 3;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0 clamp(40px, 8vw, 100px);
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .section-eyebrow {
            color: var(--accent);
            font-family: var(--font-caption);
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            font-size: clamp(2.5rem, 6vw, 4rem);
            line-height: 1;
        }

        .see-all-link {
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color var(--transition);
            white-space: nowrap;
        }

        .see-all-link:hover { color: var(--text-primary); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .hero-video { display: none; }
            .hero { background: #0d0d0d; }
        }

        @media (max-width: 1024px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .categories-grid .cat-card:first-child {
                grid-row: auto;
                aspect-ratio: 3 / 4;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                width: calc(100% - 40px);
                max-width: 360px;
                min-width: unset;
                padding: 8px 16px;
            }
            .navbar-links { display: none; }
            .navbar-icons button:not(.hamburger) { display: none; }
            .hamburger { display: flex; }

            .hero-bottom-content { flex-direction: column; align-items: flex-start; gap: 20px; padding: 0 20px; }
            .hero-text-block h1 { font-size: clamp(2.5rem, 10vw, 4rem); }
            .hero-order-btn { padding: 14px 32px; font-size: 0.85rem; }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .fog-divider { height: 90px; margin-top: -90px; }

            .categories-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== LOADER ===== */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(0);
            transition: transform 1s cubic-bezier(0.76, 0, 0.24, 1);
        }

        #loader.slide-up {
            transform: translateY(-100%);
        }

        .loader-logo {
            width: clamp(100px, 25vw, 200px);
            height: auto;
            object-fit: contain;
            animation: fadeInUp 1s ease forwards;
            opacity: 0;
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.1));
        }

        .loader-line {
            width: 0%;
            height: 1px;
            background: rgba(255,255,255,0.5);
            margin: 20px auto 0;
            animation: expandLine 1.8s ease forwards 0.4s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandLine {
            from { width: 0%; }
            to { width: 60%; }
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            background: var(--bg);
            padding: clamp(40px, 8vw, 100px) clamp(40px, 8vw, 100px);
        }

        .categories-title-wrap {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .categories-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: var(--text-primary);
            font-weight: 400;
            display: inline-block;
            position: relative;
        }

        .categories-title::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 4px auto 0;
        }

        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .cat-card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .cat-large {
            width: 100%;
            height: 75vh;
            min-height: 400px;
        }

        .cat-rest-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .cat-rest-grid .cat-card {
            height: 50vh;
            min-height: 250px;
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 0.6s ease;
        }

        .cat-card:hover img {
            transform: scale(1.04);
        }

        .cat-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        .cat-card-text {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 2;
        }

        .cat-card-text .cat-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            font-size: 1.8rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.1;
        }

        .cat-large .cat-card-text .cat-name {
            font-size: 2.2rem;
        }

        @media (max-width: 1024px) {
            .cat-large {
                height: 60vh;
                min-height: 300px;
            }
            .cat-rest-grid .cat-card {
                height: 40vh;
                min-height: 200px;
            }
        }

        @media (max-width: 768px) {
            .cat-large {
                height: 55vw;
                min-height: 250px;
            }
            .cat-rest-grid .cat-card {
                height: 55vw;
                min-height: 180px;
            }
            .cat-card-text .cat-name {
                font-size: 1.2rem;
            }
            .cat-large .cat-card-text .cat-name {
                font-size: 1.5rem;
            }
        }
        /* ===== VIEW PRODUCTS BUTTON ===== */
        .view-products-wrap {
            display: flex;
            justify-content: center;
            padding: 60px 0 80px;
            background: #0a0a0a;
        }

        .btn-view-products {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 48px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 999px;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: transparent;
            transition: all 0.3s ease;
        }

        .btn-view-products:hover {
            background: white;
            color: #0a0a0a;
            border-color: #ffffff;
        }

        /* ===== PAGE TRANSITION ===== */
        #page-transition {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .pt-brand {
            height: 64px;
            width: auto;
            object-fit: contain;
            opacity: 0.8;
            pointer-events: none;
        }
        /* Overlay */
        #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 9998; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }
        #cart-overlay.active { opacity: 1; visibility: visible; }
        #cart-drawer { position: fixed; top: 0; right: 0; width: 420px; max-width: 100vw; height: 100vh; background: #0f0f0f; border-left: 1px solid rgba(255,255,255,0.08); z-index: 9999; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.45s cubic-bezier(0.76, 0, 0.24, 1); }
        #cart-drawer.active { transform: translateX(0%); }
        .cart-drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 28px 28px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
        .cart-drawer-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1.4rem; color: #ffffff; text-transform: uppercase; letter-spacing: 0.05em; margin: 0; }
        .cart-close-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 36px; height: 36px; color: #ffffff; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .cart-close-btn:hover { background: rgba(255,255,255,0.12); }
        .cart-drawer-items { flex: 1; overflow-y: auto; padding: 20px 28px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
        .cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; padding: 60px 0; }
        .cart-empty-icon { font-size: 2.5rem; }
        .cart-empty-text { font-family: 'Inter', sans-serif; color: rgba(255,255,255,0.35); font-size: 0.9rem; }
        .cart-empty-link { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #ffffff; text-decoration: none; letter-spacing: 0.1em; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 2px; }
        .drawer-cart-item { display: flex; gap: 14px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06); align-items: flex-start; }
        .drawer-cart-item img { width: 72px; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .drawer-item-info { flex: 1; }
        .drawer-item-category { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.12em; }
        .drawer-item-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1rem; color: #ffffff; text-transform: uppercase; margin: 3px 0 5px; }
        .drawer-item-meta { font-family: 'Inter', sans-serif; font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
        .drawer-item-qty { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; width: fit-content; }
        .drawer-qty-btn { background: transparent; border: none; color: #ffffff; width: 28px; height: 28px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .drawer-qty-num { width: 28px; text-align: center; color: #ffffff; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; border-left: 1px solid rgba(255,255,255,0.12); border-right: 1px solid rgba(255,255,255,0.12); line-height: 28px; }
        .drawer-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
        .drawer-item-price { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1rem; color: #ffffff; }
        .drawer-remove-btn { background: transparent; border: none; color: rgba(255,255,255,0.25); font-size: 0.8rem; cursor: pointer; transition: color 0.2s; }
        .drawer-remove-btn:hover { color: #ffffff; }
        .cart-drawer-footer { padding: 20px 28px 32px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; background: #0f0f0f; }
        .cart-summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cart-summary-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; }
        .cart-summary-value { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: rgba(255,255,255,0.6); }
        .cart-summary-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 14px 0; }
        .cart-total-row { margin-bottom: 20px; }
        .cart-total-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1.1rem; color: #ffffff; text-transform: uppercase; }
        .cart-total-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1.3rem; color: #ffffff; }
        .btn-drawer-checkout { display: block; width: 100%; padding: 16px; background: white; color: #0a0a0a; text-align: center; text-decoration: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-style: italic; font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; transition: background 0.2s; box-sizing: border-box; }
        .btn-drawer-checkout:hover { background: rgba(255,255,255,0.88); }

        // === WISHLIST MODULE ===
        var WISHLIST_KEY='yun_wishlist';
        function getWishlist(){return JSON.parse(localStorage.getItem(WISHLIST_KEY)||'[]')}
        function saveWishlist(w){localStorage.setItem(WISHLIST_KEY,JSON.stringify(w))}
        function toggleWishlist(id){var w=getWishlist(),i=w.indexOf(id);if(i>-1)w.splice(i,1);else w.push(id);saveWishlist(w);return i===-1}
        function isInWishlist(id){return getWishlist().indexOf(id)>-1}

        // === CART DRAWER MODULE ===
        let cart = JSON.parse(localStorage.getItem('yun_cart') || '[]');
        function saveCart() { localStorage.setItem('yun_cart', JSON.stringify(cart)); updateCartUI(); }
        function openCart() { document.getElementById('cart-drawer').classList.add('active'); document.getElementById('cart-overlay').classList.add('active'); document.body.style.overflow = 'hidden'; renderCartItems(); }
        function closeCart() { document.getElementById('cart-drawer').classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); document.body.style.overflow = ''; }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeCart(); });
        function renderCartItems() {
          var list = document.getElementById('cartItemsList'), empty = document.getElementById('cartEmpty');
          if (!list) return;
          if (cart.length === 0) { list.innerHTML = ''; if (empty) empty.style.display = 'flex'; return; }
          if (empty) empty.style.display = 'none';
          list.innerHTML = cart.map(function(item, i) {
            return '<div class="drawer-cart-item">' +
              '<img src="' + optImg(item.image, 200) + '" alt="' + item.name + '" loading="lazy">' +
              '<div class="drawer-item-info">' +
                '<div class="drawer-item-category">' + (item.category||'') + '</div>' +
                '<div class="drawer-item-name">' + item.name + '</div>' +
                '<div class="drawer-item-meta">' + (item.color ? 'Color: ' + item.color : '') + (item.size ? ' / Size: ' + item.size : '') + '</div>' +
                '<div class="drawer-item-qty">' +
                  '<button class="drawer-qty-btn" onclick="changeQty(' + i + ',-1)">−</button>' +
                  '<span class="drawer-qty-num">' + item.qty + '</span>' +
                  '<button class="drawer-qty-btn" onclick="changeQty(' + i + ',1)">+</button>' +
                '</div>' +
              '</div>' +
              '<div class="drawer-item-right">' +
                '<button class="drawer-remove-btn" onclick="removeItem(' + i + ')">✕</button>' +
                '<span class="drawer-item-price">' + (item.oldPrice && item.oldPrice > item.price ? '<span style="text-decoration:line-through;opacity:0.5;margin-right:6px;font-size:0.7rem">' + (item.oldPrice * item.qty).toLocaleString() + ' DA</span>' : '') + (item.price * item.qty).toLocaleString() + ' DA</span>' +
              '</div>' +
            '</div>';
          }).join('');
          updateCartUI();
        }
        function changeQty(index, delta) { cart[index].qty += delta; if (cart[index].qty <= 0) cart.splice(index, 1); saveCart(); renderCartItems(); }
        function removeItem(index) { cart.splice(index, 1); saveCart(); renderCartItems(); }
        function updateCartUI() {
          var total = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
          var count = cart.reduce(function(s, i) { return s + i.qty; }, 0);
          var subtotalEl = document.getElementById('drawerSubtotal'), totalEl = document.getElementById('drawerTotal');
          if (subtotalEl) subtotalEl.textContent = total.toLocaleString() + ' DA';
          if (totalEl) totalEl.textContent = total.toLocaleString() + ' DA';
          var badge = document.querySelector('.cart-count-badge');
          if (badge) { badge.textContent = count; badge.classList.toggle('visible', count > 0); }
          var bBadge = document.getElementById('bottomCartBadge');
          if (bBadge) { bBadge.textContent = count; bBadge.style.display = count > 0 ? 'flex' : 'none'; }
        }
        function addToCart(item) {
          var existing = cart.find(function(c) { return c.id === item.id && c.size === item.size && c.color === item.color; });
          if (existing) { existing.qty += (item.qty || 1); } else { var newItem = JSON.parse(JSON.stringify(item)); newItem.qty = item.qty || 1; cart.push(newItem); }
          saveCart(); openCart();
        }

        document.addEventListener('DOMContentLoaded', function() {

            function openMenu() {

                document.body.style.overflow = 'hidden';

            function closeMenu() {
                mobileMenu.classList.remove('open');
                document.body.style.overflow = '';

            hamburger.addEventListener('click', openMenu);
            closeBtn.addEventListener('click', closeMenu);
            mobileLinks.forEach(function(link) {
                link.addEventListener('click', closeMenu);
            });
            mobileMenu.addEventListener('click', function(e) {
                if (e.target === mobileMenu) closeMenu();
            });

            var cartIcon = document.querySelector('.cart-icon');
            if (cartIcon) {
              cartIcon.style.position = 'relative';
              var badge = document.createElement('span');
              badge.className = 'cart-count-badge';
              badge.textContent = '0';
              cartIcon.appendChild(badge);
              cartIcon.addEventListener('click', function(e) { e.preventDefault(); openCart(); });
            }

            updateCartUI();

            var heroWrap = document.getElementById('heroWrap');
            if (heroWrap) {
                var hx = 0, hy = 0, tx = 0, ty = 0;
                document.addEventListener('mousemove', function(e) {
                    tx = (e.pageX / window.innerWidth - 0.5) * 2;
                    ty = (e.pageY / window.innerHeight - 0.5) * 2;
                });
                function animateHero() {
                    hx += (tx - hx) * 0.08;
                    hy += (ty - hy) * 0.08;
                    heroWrap.style.transform = 'translate(calc(-50% + ' + (-hx * 20) + 'px), calc(' + (-hy * 15) + 'px)) scale(1.15)';
                    requestAnimationFrame(animateHero);
                }
                animateHero();

                // Mobile gyroscope
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', function(e) {
                        var gy = (e.gamma || 0) / 45;
                        var gx = (e.beta || 0) / 45;
                        tx = Math.max(-1, Math.min(1, gy));
                        ty = Math.max(-1, Math.min(1, gx * 0.5));
                    });
                }
            }

            var seeAll = document.querySelector('.see-all-link');
            if (seeAll) {
                seeAll.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelector('.products').scrollIntoView({ behavior: 'smooth' });
                });
            }
        });

        // LOADER — only on first visit
        (function() {
          var loader = document.getElementById('loader');
          if (!loader) return;
          if (sessionStorage.getItem('yun_visited')) {
            loader.style.display = 'none';
            loader.remove();
          } else {
            sessionStorage.setItem('yun_visited', 'true');
            window.addEventListener('load', function() {
              setTimeout(function() {
                loader.style.transition = 'transform 1s cubic-bezier(0.76, 0, 0.24, 1)';
                loader.style.transform = 'translateY(-100%)';
                setTimeout(function() { loader.remove(); }, 1100);
              }, 2200);
            });
          }
        })();
    </script>

    <script>
        (function() {
          var pt = document.getElementById('page-transition');
          if (!pt) return;
          window.addEventListener('pageshow',function(){if(pt){pt.style.display='none';pt.style.transition='none';pt.style.transform='translateY(100%)';}});
          // If loader element exists in DOM, this is first visit — loader handles entrance
          if (document.getElementById('loader')) {
            pt.style.display = 'none';
            return;
          }
          pt.style.transition = 'none';
          pt.style.transform = 'translateY(0%)';
          pt.style.display = 'flex';
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              pt.style.transition = 'transform 0.7s cubic-bezier(0.76, 0, 0.24, 1)';
              pt.style.transform = 'translateY(100%)';
              setTimeout(function() { pt.style.display = 'none'; }, 750);
            });
          });
          document.addEventListener('click', function(e) {
            var link = e.target.closest('a[href]');
            if (!link) return;
            var href = link.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('tel') || link.target === '_blank') return;
            e.preventDefault();
            pt.style.display = 'flex';
            pt.style.transition = 'none';
            pt.style.transform = 'translateY(100%)';
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                pt.style.transition = 'transform 0.7s cubic-bezier(0.76, 0, 0.24, 1)';
                pt.style.transform = 'translateY(0%)';
                setTimeout(function() { window.location.href = href; }, 750);
              });
            });
          });
        })();

    }).catch(function() { if (heroSection) heroSection.style.opacity = '1'; });
  } else {
    c.from('site_settings').select('value').eq('key', 'hero_video_url').maybeSingle().then(function(res) {
      var url = res.data && res.data.value ? res.data.value.trim() : '';
      if (!url) { if (heroSection) heroSection.style.opacity = '1'; return; }
      var isImg = /\.(jpg|jpeg|png|webp|gif)/i.test(url) || url.indexOf('/image/upload/') > -1;
      if (isImg && heroImg) {
        heroImg.onload = function() { heroImg.style.display = 'block'; if (heroSection) heroSection.style.opacity = '1'; };
        heroImg.src = url;
      } else if (heroVid) {
        heroVid.innerHTML = '<source src="' + url + '" type="video/mp4">';
        heroVid.style.display = 'block';
        heroVid.load();
        heroVid.onloadeddata = function() { if (heroSection) heroSection.style.opacity = '1'; };
        heroVid.onerror = function() { if (heroSection) heroSection.style.opacity = '1'; };
      }
    }).catch(function() { if (heroSection) heroSection.style.opacity = '1'; });
  }

});
</script>
