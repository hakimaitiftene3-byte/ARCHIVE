    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; font-family: var(--font-body); background: var(--bg); color: var(--text-primary); overflow-x: hidden; }
        body { line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .navbar-icons { display: flex; align-items: center; gap: 16px; }

        /* === OUTFIT PAGE LAYOUT === */
        .outfit-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px clamp(16px, 4vw, 48px) 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }
        .back-link {
            grid-column: 1 / -1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #ffffff; }

        /* LEFT: Image */
        .outfit-gallery {
            position: sticky;
            top: 100px;
        }
        .outfit-main-img {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            aspect-ratio: 3/4;
        }
        .outfit-main-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* RIGHT: Details */

            padding-top: 8px;

            font-family: var(--font-heading);
            font-weight: 800;
            font-style: italic;
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 12px;

            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;

        .outfit-price-sale {
            font-family: var(--font-heading);
            font-weight: 800;
            font-style: italic;
            font-size: 1.4rem;
            color: var(--text-primary);
        }
        .outfit-price-old {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
            text-decoration: line-through;
        }

        /* Product Sections */

            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;

        .outfit-product-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;

        .outfit-product-img {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255,255,255,0.04);

        .outfit-product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .outfit-product-name {
            font-family: var(--font-heading);
            font-weight: 800;
            font-style: italic;
            font-size: 1rem;
            text-transform: uppercase;

        .outfit-product-label {

            letter-spacing: 0.12em;

        .outfit-sizes-label {
            font-family: var(--font-caption);
            font-size: 0.55rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;

        .outfit-product-sizes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;

        .size-btn {
            min-width: 56px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: var(--text-primary);

            font-weight: 500;

        .size-btn.out { opacity: 0.3; text-decoration: line-through; pointer-events: none; }

        /* Add to Cart */
        .outfit-actions {

            margin-bottom: 20px;

        .add-outfit-btn {

            justify-content: center;

        .add-outfit-btn:hover { background: rgba(255,255,255,0.85); }
        .add-outfit-btn:disabled { opacity: 0.35; pointer-events: none; }
        .add-outfit-btn svg { width: 18px; height: 18px; }

        /* Expandable sections */
        .expandable {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .expandable-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

        .expandable-header:hover { background: rgba(255,255,255,0.03); }
        .expandable-title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-style: italic;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .expandable-title svg { width: 16px; height: 16px; }
        .expandable-arrow {
            transition: transform 0.3s;
            color: rgba(255,255,255,0.4);
        }
        .expandable.open .expandable-arrow { transform: rotate(180deg); }
        .expandable-body {
            display: none;
            padding: 0 16px 16px;

        .expandable.open .expandable-body { display: block; }
        .expandable-body p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.8;

        .expandable-body img {
            width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        /* Size Guide Modal */
        .sg-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        .sg-overlay.open { display: flex; }
        .sg-modal { background: #111; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; }
        .sg-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #ffffff; font-size: 0.85rem; z-index: 1; }

        @media (max-width: 768px) {

            .outfit-gallery {

            .outfit-main-img {

            .navbar { width: calc(100% - 40px); max-width: 360px; padding: 8px 16px; }
            .navbar-links { display: none; }
            .navbar-icons button:not(.hamburger) { display: none; }
            .hamburger { display: flex; }
            .bottom-nav { display: block; }
            .outfit-name { font-size: 1.6rem; }
        }
        @media (max-width: 480px) {

        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

        .cd-checkout { display: block; width: 100%; padding: 16px; background: white; color: #0a0a0a; text-align: center; border-radius: 10px; font-family: var(--font-heading); font-weight: 800; font-style: italic; font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="index.html" class="bn-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>HOME</span></a>
            <a href="products.html" class="bn-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span>PRODUCTS</span></a>
            <button class="bn-item" onclick="openCart()" style="position:relative"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>CART</span><span class="bn-badge" id="bnBadge">0</span></button>
        </div>
    </nav>

    <!-- Cart Drawer -->
    <div id="cart-overlay" onclick="closeCart()"></div>
    <div id="cart-drawer">
        <div class="cd-header"><h2 class="cd-title">CART</h2><button class="cd-close" onclick="closeCart()">&#10005;</button></div>
        <div class="cd-items" id="cdItems">
            <div class="cd-empty" id="cdEmpty"><p class="cd-empty-text">Your cart is empty</p><a href="products.html" class="cd-empty-link" onclick="closeCart()">EXPLORE PRODUCTS &rarr;</a></div>
            <div id="cdList"></div>
        </div>
        <div class="cd-footer">
            <div class="cd-row"><span class="cd-label">SUBTOTAL</span><span class="cd-value" id="cdSub">0 DA</span></div>
            <div class="cd-row"><span class="cd-label">SHIPPING</span><span class="cd-value">Calculated at checkout</span></div>
            <div class="cd-divider"></div>
            <div class="cd-row"><span class="cd-total-label">TOTAL</span><span class="cd-total-value" id="cdTotal">0 DA</span></div>
            <a href="checkout.html" class="cd-checkout">PROCEED TO CHECKOUT &rarr;</a>
            <button class="cd-continue" onclick="closeCart()">&larr; CONTINUE SHOPPING</button>
        </div>
    </div>

    <!-- Size Guide Modal -->
    <div class="sg-overlay" id="sgOverlay" onclick="closeSG(event)">
        <div class="sg-modal">
            <button class="sg-close" onclick="closeSG()">&#10005;</button>
            <img id="sgImage" src="" alt="Size Guide">
        </div>
    </div>

    <script>
    var cart = JSON.parse(localStorage.getItem('yun_cart') || '[]');
    function saveCart() { localStorage.setItem('yun_cart', JSON.stringify(cart)); updateCartUI(); }
    function openCart() { document.getElementById('cart-drawer').classList.add('active'); document.getElementById('cart-overlay').classList.add('active'); document.body.style.overflow = 'hidden'; renderCD(); }
    function closeCart() { document.getElementById('cart-drawer').classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); document.body.style.overflow = ''; }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeCart(); closeSG(); } });
    function renderCD() {
        var list = document.getElementById('cdList'), empty = document.getElementById('cdEmpty');
        if (cart.length === 0) { list.innerHTML = ''; empty.style.display = 'flex'; return; }
        empty.style.display = 'none';
        list.innerHTML = cart.map(function(it, i) {
            var imgs = '';
            var meta = '';
            if (it.outfit_group_id && it.products && it.products.length > 0) {
                var prodImgs = it.products.map(function(p) {
                    return '<img src="' + optImg(p.image, 32) + '" alt="' + p.name + '" style="width:32px;height:40px;object-fit:cover;border-radius:3px">';
                }).join('');
                imgs = '<div style="display:flex;gap:4px">' + prodImgs + '</div>';
                meta = it.products.map(function(p) {
                    return '<div style="font-size:0.7rem;color:rgba(255,255,255,0.5)">' + p.name + ': ' + p.size + '</div>';
                }).join('');
            } else {
                imgs = '<img src="' + optImg(it.image, 200) + '" alt="' + it.name + '">';
                meta = (it.color ? 'Color: ' + it.color : '') + (it.size ? ' / Size: ' + it.size : '');
            }
            return '<div class="cd-item">' + imgs + '<div class="cd-item-info"><div class="cd-item-name">' + it.name + '</div>' + meta + '<div class="cd-item-qty"><button class="cd-qbtn" onclick="chgQty(' + i + ',-1)">&minus;</button><span class="cd-qnum">' + it.qty + '</span><button class="cd-qbtn" onclick="chgQty(' + i + ',1)">+</button></div></div><div class="cd-item-right"><button class="cd-rm" onclick="rmItem(' + i + ')">&#10005;</button><span class="cd-item-price">' + (it.price * it.qty).toLocaleString() + ' DA</span></div></div>';
        }).join('');
        updateCartUI();
    }
    function chgQty(i, d) { cart[i].qty += d; if (cart[i].qty <= 0) cart.splice(i, 1); saveCart(); renderCD(); }
    function rmItem(i) { cart.splice(i, 1); saveCart(); renderCD(); }
    function updateCartUI() {
        var total = cart.reduce(function(s,i){return s+i.price*i.qty},0);
        var count = cart.reduce(function(s,i){return s+i.qty},0);
        var se = document.getElementById('cdSub'), te = document.getElementById('cdTotal');
        if (se) se.textContent = total.toLocaleString() + ' DA';
        if (te) te.textContent = total.toLocaleString() + ' DA';
        var b = document.querySelector('.cart-count-badge');
        if (b) { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; }
        var bn = document.getElementById('bnBadge');
        if (bn) { bn.textContent = count; bn.style.display = count > 0 ? 'flex' : 'none'; }
    }
    function addToCart(item) {
        var ex = cart.find(function(c){return c.id===item.id&&c.size===item.size&&c.color===item.color});
        if (ex) ex.qty += (item.qty||1); else { var n = JSON.parse(JSON.stringify(item)); n.qty = item.qty||1; cart.push(n); }
        saveCart(); openCart();
    }

    function openSG(url) {
        document.getElementById('sgImage').src = url;
        document.getElementById('sgOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeSG(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('sgOverlay').classList.remove('open');
        if (!document.getElementById('cart-drawer').classList.contains('active')) document.body.style.overflow = '';
    }
    function escapeHtml(t) { if (!t) return ''; return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function fmt(n) { return Number(n).toLocaleString() + ' DA'; }
    function optImg(url, w) { if (!url || url.indexOf('cloudinary') === -1) return url; return url.replace('/image/upload/', '/image/upload/w_' + (w || 600) + ',q_auto,f_auto/'); }

    var _selectedSizes = {};
    var _selectedColors = {};
    var _outfitData = null;
    var _outfitItems = [];

    document.addEventListener('DOMContentLoaded', function() {
        YUN_I18N.init();
        var lc = document.getElementById('langSwitcher');
        if (lc) lc.innerHTML = YUN_I18N.createSwitcher();

        var hamb = document.querySelector('.hamburger'), mm = document.getElementById('mobileMenu');
        if (hamb) hamb.addEventListener('click', function(){ mm.classList.add('open'); document.body.style.overflow='hidden'; });
        var cl = document.querySelector('.mobile-menu-close');
        if (cl) cl.addEventListener('click', function(){ mm.classList.remove('open'); document.body.style.overflow=''; });
        mm.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', function(){ mm.classList.remove('open'); document.body.style.overflow=''; }); });

        var ci = document.querySelector('.cart-icon');
        if (ci) { ci.style.position='relative'; var b=document.createElement('span'); b.className='cart-count-badge'; b.textContent='0'; b.style.display='none'; ci.appendChild(b); ci.addEventListener('click',function(e){e.preventDefault();openCart();}); }
        updateCartUI();

        var slug = new URLSearchParams(window.location.search).get('slug');
    // Page transition
    (function(){
        var pt=document.getElementById('page-transition');
        if(!pt)return;
        window.addEventListener('pageshow',function(){if(pt){pt.style.display='none';pt.style.transition='none';pt.style.transform='translateY(100%)';}});
        pt.style.transition='none';pt.style.transform='translateY(0%)';pt.style.display='flex';pt.style.opacity='1';
        window.__hidePageOverlay=function(){if(pt.style.display==='none')return;pt.style.transition='opacity 0.5s';pt.style.opacity='0';setTimeout(function(){pt.style.display='none';},500);};
        setTimeout(function(){if(window.__hidePageOverlay)window.__hidePageOverlay();},5000);
        document.addEventListener('click',function(e){var l=e.target.closest('a[href]');if(!l)return;var h=l.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('tel')||l.target==='_blank')return;e.preventDefault();pt.style.display='flex';pt.style.transition='none';pt.style.transform='translateY(0%)';pt.style.opacity='1';sessionStorage.setItem('yun_visited','1');setTimeout(function(){window.location.href=h;},300);});
    })();

        if (!slug) { document.getElementById('outfitContent').innerHTML='<p style="color:rgba(255,255,255,0.4);padding:40px 0;text-align:center">Outfit not found.</p>'; if(window.__hidePageOverlay)window.__hidePageOverlay(); return; }
        if (!yunDb) { document.getElementById('outfitContent').innerHTML='<p style="color:rgba(255,255,255,0.4);padding:40px 0;text-align:center">Connection error.</p>'; if(window.__hidePageOverlay)window.__hidePageOverlay(); return; }
        loadOutfit(slug);
    });

    function loadOutfit(slug) {
        YunCache.invalidate('outfit_' + slug);

        function doLoad() {
            return YunCache.fetch('outfit_' + slug, 300000, function() {
                return yunDb.from('outfits').select('*').eq('slug', slug).eq('is_active', true).single().then(function(res) {
                    if (res.error || !res.data) throw new Error('Outfit not found');
                    var outfit = res.data;

                    return Promise.all([
                        yunDb.from('outfit_images').select('cloudinary_url, is_primary').eq('outfit_id', outfit.id),
                        yunDb.from('outfit_products').select('*').eq('outfit_id', outfit.id).order('sort_order')
                    ]).then(function(results) {
                        var imgsRes = results[0];
                        var prodsRes = results[1];

                        if (prodsRes.error) {
                            console.error('outfit_products error:', prodsRes.error);
                        }

                        var products = prodsRes.data || [];
                        console.log('[Outfit] outfit_id:', outfit.id, 'products:', products.length, products);

                        var allImgs = (imgsRes.data || []).filter(function(img, i, arr) { return arr.findIndex(function(x) { return x.cloudinary_url === img.cloudinary_url; }) === i; });
                        var mainImgObj = allImgs.find(function(img) { return img.is_primary; }) || allImgs[0];
                        var mainImg = mainImgObj ? mainImgObj.cloudinary_url : '';
                        var sgImg = allImgs.find(function(img) { return !img.is_primary; });
                        var sizeGuideUrl = sgImg ? sgImg.cloudinary_url : null;

                        if (!products.length) {
                            console.warn('[Outfit] No outfit_products found for outfit_id:', outfit.id);
                            return [outfit, mainImg, [], sizeGuideUrl];
                        }

                        var variantPromises = products.map(function(p) {
                            return yunDb.from('outfit_variants').select('*').eq('outfit_product_id', p.id).order('sort_order').then(function(vRes) {
                                if (vRes.error) {
                                    console.error('[Outfit] outfit_variants error for product', p.id, ':', vRes.error);
                                }
                                console.log('[Outfit] variants for', p.name, '(id:', p.id, '):', (vRes.data || []).length, vRes.data);
                                return {
                                    product: { name: p.name, base_price: p.price || outfit.base_price, sale_price: null },
                                    image: p.image_url || '',
                                    variants: vRes.data || []
                                };
                            });
                        });

                        return Promise.all(variantPromises).then(function(children) {
                            return [outfit, mainImg, children, sizeGuideUrl];
                        });
                    });
                });
            });
        }

        doLoad().then(function(r) {
            _outfitData = r[0];
            _outfitItems = r[2];
            _sizeGuideUrl = r[3];
            renderOutfit(r[0], r[1], r[2], r[3]);
            if(window.__hidePageOverlay)window.__hidePageOverlay();
        }).catch(function(e) {
            console.error('Outfit load error:', e);
            document.getElementById('outfitContent').innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:40px 0;text-align:center">Outfit not found. (' + e.message + ')</p>';
            if(window.__hidePageOverlay)window.__hidePageOverlay();
        });
    }

    function renderOutfit(outfit, mainImg, children, sizeGuideUrl) {
        var cp = outfit.sale_price && outfit.sale_price < outfit.base_price ? outfit.sale_price : outfit.base_price;
        var hasDiscount = outfit.sale_price && outfit.sale_price < outfit.base_price;
        var hasDesc = outfit.description && outfit.description.trim().length > 0;

        var leftHtml = '<div class="outfit-main-img"><img src="' + optImg(mainImg, 800) + '" alt="' + escapeHtml(outfit.name) + '"></div>';

        var rightHtml = '';
        rightHtml += '<h1 class="outfit-name">' + escapeHtml(outfit.name) + '</h1>';
        rightHtml += '<div class="outfit-price-row">';
        rightHtml += '<span class="outfit-price-sale">' + fmt(cp) + '</span>';
        if (hasDiscount) rightHtml += '<span class="outfit-price-old">' + fmt(outfit.base_price) + '</span>';
        rightHtml += '</div>';

        var labels = ['A', 'B', 'C', 'D'];
        children.forEach(function(child, idx) {
            var pName = child.product.name || 'Product';
            var label = labels[idx] || String.fromCharCode(65 + idx);

            // Build color map from variants
            var colorMap = {};
            child.variants.forEach(function(v) {
                var c = (v.color && v.color !== 'default') ? v.color : 'Default';
                if (!colorMap[c]) colorMap[c] = [];
                colorMap[c].push(v);
            });
            var colors = Object.keys(colorMap);
            var hasMultipleColors = colors.length > 1;

            // If single color, auto-select it
            if (!hasMultipleColors && colors.length === 1) {
                _selectedColors[idx] = colors[0];
            }

            var currentColor = _selectedColors[idx] || colors[0] || 'Default';
            var sizeMap = {};
            (colorMap[currentColor] || child.variants).forEach(function(v) {
                if (!sizeMap[v.size]) sizeMap[v.size] = { size: v.size, stock: 0 };
                sizeMap[v.size].stock += (v.stock || 0);
            });
            var sizes = Object.values(sizeMap);

            rightHtml += '<div class="outfit-product-section">';
            rightHtml += '<div class="outfit-product-header">';
            rightHtml += '<div class="outfit-product-img"><img src="' + optImg(child.image, 300) + '" alt="' + escapeHtml(pName) + '"></div>';
            rightHtml += '<div><div class="outfit-product-label">PRODUCT ' + label + '</div>';
            rightHtml += '<div class="outfit-product-name">' + escapeHtml(pName) + ' — ' + fmt(child.product.base_price) + '</div></div>';
            rightHtml += '</div>';

            // Color selector (only if multiple colors)
            if (hasMultipleColors) {
                rightHtml += '<div class="outfit-sizes-label">COLOR</div>';
                rightHtml += '<div class="outfit-product-colors" data-product-idx="' + idx + '">';
                colors.forEach(function(c) {
                    var cls = 'color-swatch' + (c === currentColor ? ' selected' : '');
                    rightHtml += '<button class="' + cls + '" data-color="' + escapeHtml(c) + '">' + escapeHtml(c) + '</button>';
                });
                rightHtml += '</div>';
            }

            rightHtml += '<div class="outfit-sizes-label">SIZE</div>';
            rightHtml += '<div class="outfit-product-sizes" data-product-idx="' + idx + '">';
            sizes.forEach(function(sz) {
                var cls = sz.stock <= 0 ? 'size-btn out' : 'size-btn';
                rightHtml += '<button class="' + cls + '" data-size="' + sz.size + '" data-stock="' + sz.stock + '">' + sz.size + '</button>';
            });
            rightHtml += '</div>';
            rightHtml += '</div>';
        });

        rightHtml += '<div class="outfit-actions">';
        rightHtml += '<button class="add-outfit-btn" id="addOutfitBtn" disabled style="width:100%">';
        rightHtml += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>';
        rightHtml += 'ADD TO CART';
        rightHtml += '</button>';
        rightHtml += '</div>';

        if (hasDesc) {
            rightHtml += '<div class="expandable" id="descSection">';
            rightHtml += '<div class="expandable-header" onclick="toggleExpand(\'descSection\')">';
            rightHtml += '<span class="expandable-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> DESCRIPTION</span>';
            rightHtml += '<span class="expandable-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>';
            rightHtml += '</div>';
            rightHtml += '<div class="expandable-body"><p>' + outfit.description.replace(/\n/g, '<br>') + '</p></div>';
            rightHtml += '</div>';
        }

        if (sizeGuideUrl) {
            rightHtml += '<div class="expandable" id="sgSection">';
            rightHtml += '<div class="expandable-header" onclick="toggleExpand(\'sgSection\')">';
            rightHtml += '<span class="expandable-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l2-4 4 8 2-4h4"/></svg> SIZE GUIDE</span>';
            rightHtml += '<span class="expandable-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>';
            rightHtml += '</div>';
            rightHtml += '<div class="expandable-body"><p>Size measurements may vary by 1-2 cm.</p>';
            rightHtml += '<img src="' + optImg(sizeGuideUrl, 600) + '" alt="Size Guide" style="cursor:pointer" onclick="openSG(\'' + optImg(sizeGuideUrl, 800) + '\')">';
            rightHtml += '</div>';
            rightHtml += '</div>';
        }

        var pg = document.getElementById('outfitPage');
        pg.innerHTML = '';
        var backLink = document.createElement('a');
        backLink.href = 'products.html';
        backLink.className = 'back-link';
        backLink.innerHTML = '&larr; Back to Shop';
        pg.appendChild(backLink);

        var gallery = document.createElement('div');
        gallery.className = 'outfit-gallery';
        gallery.innerHTML = leftHtml;
        pg.appendChild(gallery);

        var details = document.createElement('div');
        details.className = 'outfit-details';
        details.innerHTML = rightHtml;
        pg.appendChild(details);

        details.querySelectorAll('.outfit-product-sizes').forEach(function(container) {
            container.addEventListener('click', function(e) {
                var btn = e.target.closest('.size-btn');
                if (!btn || btn.classList.contains('out')) return;
                var pIdx = container.getAttribute('data-product-idx');
                container.querySelectorAll('.size-btn').forEach(function(b) { b.classList.remove('selected'); });
                btn.classList.add('selected');
                _selectedSizes[pIdx] = btn.getAttribute('data-size');
                updateAddBtn();
            });
        });

        // Color click handler
        details.querySelectorAll('.outfit-product-colors').forEach(function(container) {
            container.addEventListener('click', function(e) {
                var btn = e.target.closest('.color-swatch');
                if (!btn) return;
                var pIdx = container.getAttribute('data-product-idx');
                container.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('selected'); });
                btn.classList.add('selected');
                var colorName = btn.getAttribute('data-color');
                _selectedColors[pIdx] = colorName;
                // Clear size selection for this child and re-render sizes
                delete _selectedSizes[pIdx];
                var child = _outfitItems[pIdx];
                if (child) {
                    var colorMap = {};
                    child.variants.forEach(function(v) {
                        var c = (v.color && v.color !== 'default') ? v.color : 'Default';
                        if (!colorMap[c]) colorMap[c] = [];
                        colorMap[c].push(v);
                    });
                    var sizeMap = {};
                    (colorMap[colorName] || []).forEach(function(v) {
                        if (!sizeMap[v.size]) sizeMap[v.size] = { size: v.size, stock: 0 };
                        sizeMap[v.size].stock += (v.stock || 0);
                    });
                    var sizes = Object.values(sizeMap);
                    var sizeContainer = details.querySelector('.outfit-product-sizes[data-product-idx="' + pIdx + '"]');
                    if (sizeContainer) {
                        sizeContainer.innerHTML = '';
                        sizes.forEach(function(sz) {
                            var cls = sz.stock <= 0 ? 'size-btn out' : 'size-btn';
                            var b = document.createElement('button');
                            b.className = cls;
                            b.setAttribute('data-size', sz.size);
                            b.setAttribute('data-stock', sz.stock);
                            b.textContent = sz.size;
                            sizeContainer.appendChild(b);
                        });
                    }
                }
                updateAddBtn();
            });
        });

        details.querySelector('#addOutfitBtn').addEventListener('click', addOutfitToCart);

        // Hover preview for child product images
        var preview = document.getElementById('outfitPreview');
        var previewImg = preview.querySelector('img');
        details.querySelectorAll('.outfit-product-img').forEach(function(imgWrap) {
            var img = imgWrap.querySelector('img');
            if (!img) return;
            img.addEventListener('mouseenter', function(e) {
                previewImg.src = img.src;
                preview.classList.add('active');
            });
            img.addEventListener('mousemove', function(e) {
                var x = e.clientX + 16;
                var y = e.clientY - 180;
                if (x + 300 > window.innerWidth) x = e.clientX - 300;
                if (y < 10) y = 10;
                if (y + 380 > window.innerHeight) y = window.innerHeight - 380;
                preview.style.left = x + 'px';
                preview.style.top = y + 'px';
            });
            img.addEventListener('mouseleave', function() {
                preview.classList.remove('active');
            });
        });
    }

    function toggleExpand(id) {
        document.getElementById(id).classList.toggle('open');
    }

    function updateAddBtn() {
        var btn = document.getElementById('addOutfitBtn');
        if (!btn) return;
        var allSelected = _outfitItems.length > 0 && _outfitItems.every(function(_, i) { return _selectedSizes[i]; });
        btn.disabled = !allSelected;
    }

    function addOutfitToCart() {
        if (!_outfitData || !_outfitItems.length) return;
        var allSelected = _outfitItems.every(function(_, i) { return _selectedSizes[i]; });
        if (!allSelected) return;

        var sizeParts = [];
        var products = [];
        _outfitItems.forEach(function(child, idx) {
            var label = String.fromCharCode(65 + idx);
            var size = _selectedSizes[idx];
            var color = _selectedColors[idx] || 'default';
            sizeParts.push(label + ':' + size);
            products.push({
                name: child.product.name,
                size: size,
                color: color,
                image: child.image,
                price: child.product.sale_price && child.product.sale_price < child.product.base_price ? child.product.sale_price : child.product.base_price
            });
        });

        var groupId = _outfitData.slug + '_' + Date.now();
        var mainImg = document.querySelector('.outfit-main-img img');
        var cp = _outfitData.sale_price && _outfitData.sale_price < _outfitData.base_price ? _outfitData.sale_price : _outfitData.base_price;

        addToCart({
            id: _outfitData.slug,
            slug: _outfitData.slug,
            name: _outfitData.name,
            price: cp,
            oldPrice: _outfitData.base_price,
            size: sizeParts.join(' + '),
            color: 'default',
            qty: 1,
            image: mainImg ? mainImg.src : '',
            outfit_group_id: groupId,
            products: products
        });

        var btn = document.getElementById('addOutfitBtn');
        var original = btn.innerHTML;
        btn.innerHTML = '&#10003; ADDED!';
        btn.style.background = '#2e7d32';
        btn.style.color = 'white';
        setTimeout(function() {
            btn.innerHTML = original;
            btn.style.background = '';
            btn.style.color = '';
        }, 1500);
    }
    </script>

</body>
